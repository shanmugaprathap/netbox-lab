apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "netbox-lab.fullname" . }}-worker
  labels:
    {{- include "netbox-lab.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "netbox-lab.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "netbox-lab.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      securityContext:
        fsGroup: 0
      initContainers:
        - name: wait-for-netbox
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for NetBox to be ready..."
              until wget -q --spider http://{{ include "netbox-lab.fullname" . }}-netbox:{{ .Values.netbox.service.port }}{{ .Values.netbox.healthcheck.path }}; do
                sleep 5
              done
              echo "NetBox is ready"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: worker
          image: "{{ .Values.netbox.image.repository }}:{{ .Values.netbox.image.tag }}"
          imagePullPolicy: {{ .Values.netbox.image.pullPolicy }}
          command:
            - /opt/netbox/venv/bin/python
            - /opt/netbox/netbox/manage.py
            - rqworker
          envFrom:
            - configMapRef:
                name: {{ include "netbox-lab.fullname" . }}-netbox-env
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "netbox-lab.fullname" . }}-netbox
                  key: db-password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "netbox-lab.fullname" . }}-netbox
                  key: redis-tasks-password
            - name: REDIS_CACHE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "netbox-lab.fullname" . }}-netbox
                  key: redis-cache-password
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "netbox-lab.fullname" . }}-netbox
                  key: secret-key
            - name: API_TOKEN_PEPPER_1
              valueFrom:
                secretKeyRef:
                  name: {{ include "netbox-lab.fullname" . }}-netbox
                  key: api-token-pepper
          volumeMounts:
            - name: config
              mountPath: /etc/netbox/config/extra.py
              subPath: extra.py
            - name: config
              mountPath: /etc/netbox/config/logging.py
              subPath: logging.py
            - name: config
              mountPath: /etc/netbox/config/plugins.py
              subPath: plugins.py
            - name: media
              mountPath: /opt/netbox/netbox/media
            - name: reports
              mountPath: /opt/netbox/netbox/reports
            - name: scripts
              mountPath: /opt/netbox/netbox/scripts
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pgrep -f rqworker
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "netbox-lab.fullname" . }}-netbox-config
        - name: media
          persistentVolumeClaim:
            claimName: {{ include "netbox-lab.fullname" . }}-media
        - name: reports
          persistentVolumeClaim:
            claimName: {{ include "netbox-lab.fullname" . }}-reports
        - name: scripts
          persistentVolumeClaim:
            claimName: {{ include "netbox-lab.fullname" . }}-scripts
