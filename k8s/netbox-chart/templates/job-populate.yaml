{{- if .Values.populate.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "netbox-lab.fullname" . }}-populate
  labels:
    {{- include "netbox-lab.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        {{- include "netbox-lab.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: populate
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-netbox
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for NetBox API to be reachable..."
              until wget -q --spider http://{{ include "netbox-lab.fullname" . }}-netbox:{{ .Values.netbox.service.port }}/login/ 2>/dev/null; do
                echo "  NetBox not ready yet, retrying in 10s..."
                sleep 10
              done
              echo "NetBox API is reachable!"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: populate
          image: "{{ .Values.populate.image.repository }}:{{ .Values.populate.image.tag }}"
          command:
            - sh
            - -c
            - |
              pip install --quiet pynetbox requests && \
              cd /scripts && \
              python populate.py
          env:
            - name: NETBOX_URL
              value: "http://{{ include "netbox-lab.fullname" . }}-netbox:{{ .Values.netbox.service.port }}"
            - name: NETBOX_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "netbox-lab.fullname" . }}-netbox
                  key: superuser-api-token
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: scripts
          configMap:
            name: {{ include "netbox-lab.fullname" . }}-populate-script
{{- end }}
