apiVersion: v1
kind: Pod
metadata:
  name: {{ include "netbox-lab.fullname" . }}-test-connection
  labels:
    {{- include "netbox-lab.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  restartPolicy: Never
  containers:
    - name: test
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "Testing NetBox connectivity..."
          wget -q --spider http://{{ include "netbox-lab.fullname" . }}-netbox:{{ .Values.netbox.service.port }}/login/
          if [ $? -eq 0 ]; then
            echo "SUCCESS: NetBox is responding on port {{ .Values.netbox.service.port }}"
            exit 0
          else
            echo "FAIL: NetBox is not responding"
            exit 1
          fi
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 50m
          memory: 32Mi
