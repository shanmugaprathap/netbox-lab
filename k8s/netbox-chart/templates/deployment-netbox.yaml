apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "netbox-lab.fullname" . }}-netbox
  labels:
    {{- include "netbox-lab.labels" . | nindent 4 }}
    app.kubernetes.io/component: netbox
spec:
  replicas: {{ .Values.netbox.replicaCount }}
  selector:
    matchLabels:
      {{- include "netbox-lab.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: netbox
  template:
    metadata:
      labels:
        {{- include "netbox-lab.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: netbox
    spec:
      securityContext:
        fsGroup: 0
      initContainers:
        # Wait for PostgreSQL to be ready
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until nc -z {{ include "netbox-lab.postgresql.host" . }} 5432; do
                sleep 2
              done
              echo "PostgreSQL is ready"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
        # Wait for Redis to be ready
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Redis..."
              until nc -z {{ include "netbox-lab.redis-tasks.host" . }} 6379; do
                sleep 2
              done
              until nc -z {{ include "netbox-lab.redis-cache.host" . }} 6379; do
                sleep 2
              done
              echo "Redis is ready"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: netbox
          image: "{{ .Values.netbox.image.repository }}:{{ .Values.netbox.image.tag }}"
          imagePullPolicy: {{ .Values.netbox.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "netbox-lab.fullname" . }}-netbox-env
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "netbox-lab.fullname" . }}-netbox
                  key: db-password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "netbox-lab.fullname" . }}-netbox
                  key: redis-tasks-password
            - name: REDIS_CACHE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "netbox-lab.fullname" . }}-netbox
                  key: redis-cache-password
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "netbox-lab.fullname" . }}-netbox
                  key: secret-key
            - name: API_TOKEN_PEPPER_1
              valueFrom:
                secretKeyRef:
                  name: {{ include "netbox-lab.fullname" . }}-netbox
                  key: api-token-pepper
            - name: SUPERUSER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "netbox-lab.fullname" . }}-netbox
                  key: superuser-password
            - name: SUPERUSER_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "netbox-lab.fullname" . }}-netbox
                  key: superuser-api-token
          volumeMounts:
            - name: config
              mountPath: /etc/netbox/config/extra.py
              subPath: extra.py
            - name: config
              mountPath: /etc/netbox/config/logging.py
              subPath: logging.py
            - name: config
              mountPath: /etc/netbox/config/plugins.py
              subPath: plugins.py
            - name: media
              mountPath: /opt/netbox/netbox/media
            - name: reports
              mountPath: /opt/netbox/netbox/reports
            - name: scripts
              mountPath: /opt/netbox/netbox/scripts
          startupProbe:
            httpGet:
              path: {{ .Values.netbox.healthcheck.path }}
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: {{ .Values.netbox.healthcheck.path }}
              port: http
            periodSeconds: {{ .Values.netbox.healthcheck.periodSeconds }}
            timeoutSeconds: {{ .Values.netbox.healthcheck.timeoutSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.netbox.healthcheck.path }}
              port: http
            periodSeconds: 10
            timeoutSeconds: {{ .Values.netbox.healthcheck.timeoutSeconds }}
          resources:
            {{- toYaml .Values.netbox.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "netbox-lab.fullname" . }}-netbox-config
        - name: media
          persistentVolumeClaim:
            claimName: {{ include "netbox-lab.fullname" . }}-media
        - name: reports
          persistentVolumeClaim:
            claimName: {{ include "netbox-lab.fullname" . }}-reports
        - name: scripts
          persistentVolumeClaim:
            claimName: {{ include "netbox-lab.fullname" . }}-scripts
