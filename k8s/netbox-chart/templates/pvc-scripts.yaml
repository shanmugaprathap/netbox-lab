apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "netbox-lab.fullname" . }}-scripts
  labels:
    {{- include "netbox-lab.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.netbox.persistence.scripts.storageClass }}
  storageClassName: {{ .Values.netbox.persistence.scripts.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.netbox.persistence.scripts.size }}
