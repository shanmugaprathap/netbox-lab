apiVersion: v1
kind: Service
metadata:
  name: {{ include "netbox-lab.fullname" . }}-netbox
  labels:
    {{- include "netbox-lab.labels" . | nindent 4 }}
    app.kubernetes.io/component: netbox
spec:
  type: {{ .Values.netbox.service.type }}
  ports:
    - port: {{ .Values.netbox.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if and (eq .Values.netbox.service.type "NodePort") .Values.netbox.service.nodePort }}
      nodePort: {{ .Values.netbox.service.nodePort }}
      {{- end }}
  selector:
    {{- include "netbox-lab.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: netbox
